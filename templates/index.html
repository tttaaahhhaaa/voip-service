<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMS VoIP - Virtual Number Receiver</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0f172a; color: #e2e8f0;
            min-height: 100vh; display: flex; flex-direction: column;
        }
        header {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0.75rem 1.5rem; background: #1e293b; border-bottom: 1px solid #334155;
        }
        header h1 { font-size: 1rem; color: #38bdf8; font-weight: 600; }
        header .status { display: flex; align-items: center; gap: 0.5rem; font-size: 0.8rem; }
        .dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; }
        .dot.connecting { background: #eab308; animation: pulse 1s infinite; }
        .dot.disconnected { background: #ef4444; }
        @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
        .container { flex: 1; display: flex; flex-direction: column; max-width: 900px; margin: 0 auto; width: 100%; padding: 1rem; }

        /* Number Display - Top */
        .number-display {
            background: linear-gradient(135deg, #1e293b, #0f172a);
            border: 1px solid #334155; border-radius: 16px;
            padding: 1.5rem; text-align: center; margin-bottom: 1rem;
        }
        .number-display .label { font-size: 0.7rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.1em; }
        .number-display .num {
            font-size: 2rem; font-family: 'Courier New', monospace;
            color: #38bdf8; margin-top: 0.25rem; font-weight: 700;
            letter-spacing: 0.05em;
        }
        .number-display .country { font-size: 0.85rem; color: #94a3b8; margin-top: 0.25rem; }
        .number-display .provider-badge {
            display: inline-block; margin-top: 0.5rem;
            background: #1e3a5f; color: #60a5fa;
            padding: 0.2rem 0.75rem; border-radius: 20px; font-size: 0.7rem;
        }

        /* Controls */
        .controls {
            display: flex; gap: 0.5rem; flex-wrap: wrap;
            margin-bottom: 1rem; align-items: center;
        }
        .controls select, .controls input, .controls button { font-size: 0.85rem; }
        select, input {
            background: #1e293b; border: 1px solid #334155; border-radius: 8px;
            padding: 0.5rem 0.75rem; color: #e2e8f0; flex: 1; min-width: 120px;
        }
        select:focus, input:focus { outline: none; border-color: #38bdf8; }
        .btn {
            background: #38bdf8; color: #0f172a; border: none;
            padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer;
            font-weight: 600; font-size: 0.85rem; white-space: nowrap;
            transition: all 0.2s;
        }
        .btn:hover { background: #7dd3fc; }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-success { background: #22c55e; color: #fff; }
        .btn-success:hover { background: #4ade80; }
        .btn-danger { background: #ef4444; color: #fff; }
        .btn-danger:hover { background: #f87171; }

        /* SMS Chat - scrolls downward like WhatsApp */
        .sms-chat {
            flex: 1; overflow-y: auto; display: flex; flex-direction: column;
            gap: 0.5rem; padding: 1rem; min-height: 300px; max-height: 60vh;
            background: #0f172a; border: 1px solid #334155; border-radius: 16px;
        }
        .sms-chat:empty::after {
            content: 'SMS bekleniyor... Bir numara seçin ve siteye kaydolun.';
            display: block; text-align: center; color: #475569; padding: 2rem;
            font-size: 0.85rem;
        }
        .sms-msg {
            display: flex; flex-direction: column; max-width: 85%;
            animation: fadeIn 0.3s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .sms-msg.incoming { align-self: flex-start; }
        .sms-msg.outgoing { align-self: flex-end; }
        .sms-msg .bubble {
            padding: 0.75rem 1rem; border-radius: 16px;
            font-size: 0.9rem; line-height: 1.5; word-break: break-word;
        }
        .sms-msg.incoming .bubble {
            background: #1e293b; border: 1px solid #334155;
            border-bottom-left-radius: 4px; color: #e2e8f0;
        }
        .sms-msg.outgoing .bubble {
            background: #1e3a5f; border: 1px solid #1e4a7a;
            border-bottom-right-radius: 4px; color: #e2e8f0;
        }
        .sms-msg .meta {
            display: flex; gap: 0.5rem; align-items: center;
            font-size: 0.65rem; color: #64748b; margin-top: 0.25rem;
            padding: 0 0.25rem;
        }
        .sms-msg.incoming .meta { justify-content: flex-start; }
        .sms-msg.outgoing .meta { justify-content: flex-end; }
        .sms-msg .code-badge {
            display: inline-block; background: #0f172a; border: 1px solid #166534;
            color: #34d399; padding: 0.15rem 0.5rem; border-radius: 6px;
            font-family: monospace; font-size: 1.1rem; font-weight: 700;
            margin-top: 0.4rem;
        }
        .sms-msg .sender-tag {
            display: inline-block; padding: 0.1rem 0.4rem;
            border-radius: 4px; font-size: 0.65rem; background: #334155; color: #94a3b8;
        }
        .empty-state {
            text-align: center; padding: 3rem; color: #475569;
        }
        .empty-state .icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
        .empty-state p { font-size: 0.85rem; }

        /* Responsive */
        @media (max-width: 600px) {
            .number-display .num { font-size: 1.4rem; }
            .controls { flex-direction: column; }
            .controls select, .controls input { width: 100%; }
            .sms-msg { max-width: 95%; }
        }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        /* Privacy badge */
        .privacy-badge {
            display: flex; align-items: center; gap: 0.35rem;
            background: #16653420; border: 1px solid #16653440;
            color: #86efac; padding: 0.25rem 0.75rem; border-radius: 20px;
            font-size: 0.7rem;
        }
        .loading-spinner {
            display: inline-block; width: 12px; height: 12px;
            border: 2px solid #334155; border-top-color: #38bdf8;
            border-radius: 50%; animation: spin 0.6s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header>
        <h1>SMS Receiver</h1>
        <div style="display:flex;gap:0.75rem;align-items:center">
            <span class="privacy-badge">🔒 Özel - Sadece Senin Bilgisayarında</span>
            <div class="status">
                <span id="wsDot" class="dot"></span>
                <span id="wsStatus">Bağlanıyor...</span>
            </div>
        </div>
    </header>

    <div class="container">
        <!-- Selected Number Display -->
        <div class="number-display" id="numberDisplay">
            <div class="label">Numara Seçilmedi</div>
            <div class="num" id="displayNumber">—</div>
            <div class="country" id="displayCountry">Bir ülke ve numara seçin</div>
            <div id="displayBadge"></div>
        </div>

        <!-- Controls -->
        <div class="controls">
            <select id="countrySelect" onchange="onCountryChange()">
                <option value="">Ülke yükleniyor...</option>
            </select>
            <select id="numberSelect" disabled>
                <option value="">Önce ülke seçin</option>
            </select>
            <button class="btn btn-success" id="selectBtn" onclick="selectNumber()" disabled>Numarayı Kullan</button>
            <button class="btn btn-danger" id="releaseBtn" onclick="releaseNumber()" style="display:none">Numarayı Değiştir</button>
        </div>

        <!-- Provider Selector -->
        <div class="controls" style="margin-bottom:0.75rem">
            <select id="providerSelect" onchange="onProviderChange()" style="flex:0 1 auto;min-width:auto">
                <option value="">Sağlayıcı...</option>
            </select>
            <span id="providerStatus" style="font-size:0.75rem;color:#64748b"></span>
            <span style="flex:1"></span>
            <span style="font-size:0.7rem;color:#475569">
                <span id="msgCount">0</span> mesaj
            </span>
            <button class="btn" onclick="clearMessages()" style="font-size:0.75rem;padding:0.35rem 0.75rem">Temizle</button>
        </div>

        <!-- SMS Chat -->
        <div class="sms-chat" id="smsChat"></div>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
